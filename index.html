    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f0f3f6;

      --accent:  #3a5c7a;
      --light:   #d8e3ec;

      --font:    'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--dark); min-height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--light);
      padding: 26px 52px 0; position: sticky; top: 0; z-index: 10;
    }
    .topbar-inner {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .name { font-size: 26px; font-weight: 600; letter-spacing: -0.6px; line-height: 1; }
    .subtitle { font-size: 11px; color: var(--accent); margin-top: 4px; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 7px;
      background: rgba(58,92,122,0.1); border: 1px solid rgba(58,92,122,0.25);
      color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 9px;
    }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .topbar-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .contact-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .c-item { font-size: 9.5px; color: var(--mid); }
    .c-link { font-size: 9.5px; color: var(--accent); text-decoration: none; transition: opacity .15s; }
    .c-link:hover { opacity: 0.7; }
    .c-pdf {
      background: var(--dark); color: var(--white); padding: 6px 14px; font-size: 9.5px;
      text-decoration: none; letter-spacing: 0.3px; border-radius: 1px; transition: opacity .15s; font-family: var(--font);
    }
    .c-pdf:hover { opacity: 0.8; }

    /* Lang switcher */
    .lang-row { display: flex; gap: 2px; }
    .lang-btn {
      background: none; border: 1px solid var(--light); padding: 3px 9px; font-size: 9.5px;
      cursor: pointer; color: var(--mid); font-family: var(--font); letter-spacing: 0.3px;
      transition: all .15s; border-radius: 2px;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lang-btn.active { background: var(--dark); color: var(--white); border-color: var(--dark); font-weight: 500; }

    /* Tabs */
    .tabs { display: flex; margin-left: -6px; }
    .tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      padding: 8px 18px; font-size: 11.5px; cursor: pointer; color: var(--mid);
      font-weight: 400; letter-spacing: 0.2px; transition: all .15s;
      font-family: var(--font); margin-bottom: -1px;
    }
    .tab:hover { color: var(--dark); }
    .tab.active { border-bottom-color: var(--dark); color: var(--dark); font-weight: 500; }

    /* ── Content grid ── */
    .grid { display: grid; grid-template-columns: 1fr 230px; gap: 32px; padding: 36px 52px; max-width: 1100px; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .entry { display: flex; justify-content: space-between; gap: 20px; padding-bottom: 22px; margin-bottom: 22px; border-bottom: 1px solid var(--light); }
    .entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .entry-body { flex: 1; }
    .entry-title { font-size: 15px; font-weight: 500; line-height: 1.3; }
    .entry-org { font-size: 11px; color: var(--accent); margin-top: 4px; }
    .entry-detail { font-size: 12px; color: var(--mid); margin-top: 9px; line-height: 1.65; }
    .entry-detail ul { padding-left: 14px; }
    .entry-detail li { margin-bottom: 3px; }
    .entry-year { font-size: 10px; color: var(--mid); flex-shrink: 0; padding-top: 3px; white-space: nowrap; }

    /* Pub links */
    .pub-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .pub-link { font-size: 10px; color: var(--accent); text-decoration: none; border: 1px solid var(--light); padding: 3px 10px; border-radius: 2px; transition: background .15s; }
    .pub-link:hover { background: var(--pill); }

    /* Project links */
    .proj-link { font-size: 10px; color: var(--dark); text-decoration: none; background: var(--pill); padding: 3px 10px; border-radius: 2px; margin-top: 8px; display: inline-block; }
    .proj-link:hover { background: #ccdce9; }

    /* ── Info panel ── */
    .info-panel { display: flex; flex-direction: column; gap: 18px; }
    .info-card { background: var(--white); padding: 18px 18px 16px; border-radius: 2px; }
    .info-label { font-size: 8px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 13px; }

    /* Skill bars */
    .skill-row { margin-bottom: 10px; }
    .skill-name { font-size: 11px; font-weight: 500; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: baseline; }
    .skill-note { font-size: 8.5px; color: var(--mid); font-weight: 400; }
    .skill-bar { height: 3px; background: var(--light); border-radius: 2px; overflow: hidden; }
    .skill-fill { height: 100%; border-radius: 2px; background: var(--accent); }

    .lang-row-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
    .lang-name { font-size: 12px; font-weight: 500; }
    .lang-level { font-size: 9.5px; color: var(--mid); }

    .info-item { font-size: 9.5px; color: var(--mid); margin-bottom: 4px; line-height: 1.5; }
    .info-accent { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      .topbar { padding: 18px 20px 0; }
      .grid { grid-template-columns: 1fr; padding: 24px 20px; gap: 24px; }
      .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    }
    @media (max-width: 520px) {
      .topbar-right { align-items: flex-start; }
      .info-panel { grid-template-columns: 1fr; }
    }

    /* ── About block ── */
    .about-block { max-width: 640px; }
    .about-block p { font-size: 13.5px; line-height: 1.8; color: var(--dark); margin-bottom: 18px; text-align: justify; text-wrap: pretty; }
    .about-block p:last-child { margin-bottom: 0; }

    /* ── Print ── */
    @media print {
      .topbar { position: static; }
      .tabs, .lang-row, .c-pdf { display: none; }
      .grid { grid-template-columns: 1fr; }
      .panel { display: block !important; margin-bottom: 24px; }
      .info-panel { display: flex; flex-direction: row; flex-wrap: wrap; gap: 16px; }
      .info-card { flex: 1; min-width: 160px; }
    }
  </style>
</head>

// ── Render ────────────────────────────────────────────────────────────────────
let curLang = localStorage.getItem('cv-lang') || 'fr';
let curTab  = localStorage.getItem('cv-tab')  || 'formation';

function renderTabs(t) {
  const nav = document.getElementById('tabs');
  nav.innerHTML = t.tabs.map(id => `
    <button class="tab${id===curTab?' active':''}" data-tab="${id}">${t.tabLabels[id]}</button>
  `).join('');
  nav.querySelectorAll('.tab').forEach(btn =>
    btn.addEventListener('click', () => { curTab = btn.dataset.tab; localStorage.setItem('cv-tab', curTab); render(); })
  );
}

function entryHTML(e) {
  let detail = '';
  if (e.bullets) {
    detail = `<div class="entry-detail"><ul>${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
  } else if (e.detail) {
    detail = `<div class="entry-detail">${e.detail}</div>`;
  }
  return `
    <div class="entry">
      <div class="entry-body">
        <div class="entry-title">${e.title}</div>
        ${e.org ? `<div class="entry-org">${e.org}</div>` : ''}
        ${detail}
      </div>
      ${e.year ? `<div class="entry-year">${e.year}</div>` : ''}
    </div>`;
}

function renderMain(t) {
  // Reset curTab to first tab if saved value isn't valid
  if (!t.tabs.includes(curTab)) curTab = t.tabs[0];
  const panels = {
    apropos:      t.apropos || '',
    formation:    t.formation.map(entryHTML).join(''),
    experience:   t.experience.map(entryHTML).join(''),
    publications: t.publications.map(e => `
      <div class="entry">
        <div class="entry-body">
          <div class="entry-title">${e.title}</div>
          <div class="entry-org">${e.org}</div>
          <div class="entry-detail">${e.detail}</div>
          <div class="pub-links">
            <a href="https://research-center.amundi.com/article/natural-capital-and-economic-growth" target="_blank" rel="noreferrer" class="pub-link">Amundi ↗</a>
            <a href="https://www.researchgate.net/publication/394967692_Natural_Capital_and_Economic_Growth" target="_blank" rel="noreferrer" class="pub-link">ResearchGate ↗</a>
            <a href="https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5405959" target="_blank" rel="noreferrer" class="pub-link">SSRN ↗</a>
          </div>
        </div>
        <div class="entry-year">${e.year}</div>
      </div>`).join(''),
    projets: t.projets.map(e => `
      <div class="entry">
        <div class="entry-body">
          <div class="entry-title">${e.title}</div>
          <div class="entry-org">${e.org}</div>
          <a href="${e.link}" target="_blank" rel="noreferrer" class="proj-link">Voir PDF ↗</a>
        </div>
      </div>`).join(''),
  };
  document.getElementById('main').innerHTML = t.tabs.map(id => `
    <div id="panel-${id}" class="panel">
      ${panels[id] || ''}
    </div>`).join('');
  const activePanel = document.getElementById('panel-' + curTab);
  if (activePanel) activePanel.classList.add('active');
}

function renderInfo(t) {
  const skillsHTML = t.skills.map(s => `
    <div class="skill-row">
      <div class="skill-name">${s.name} <span class="skill-note">${s.note}</span></div>
      <div class="skill-bar"><div class="skill-fill" style="width:${s.pct}%"></div></div>
    </div>`).join('');

  const otherHTML = `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">${
    t.otherSkills.map(s=>`<span style="background:var(--pill);padding:2px 7px;border-radius:2px;font-size:9.5px">${s}</span>`).join('')
  }</div>`;

  const langsHTML = t.languages.map(l => `
    <div class="lang-row-info">
      <span class="lang-name">${l.name}</span>
      <span class="lang-level">${l.level}</span>
    </div>`).join('');

  const contactHTML = `
    <div class="info-item info-accent">antoine.jean.roncalli@gmail.com</div>
    <div class="info-item">+33 6 64 77 03 43</div>
    <a href="https://www.linkedin.com/in/antoine-jean-eco" target="_blank" rel="noreferrer" style="font-size:9.5px;color:var(--accent);text-decoration:none;display:block;margin-top:4px">LinkedIn ↗</a>
    <a href="https://www.researchgate.net/profile/Antoine-Jean-4" target="_blank" rel="noreferrer" style="font-size:9.5px;color:var(--accent);text-decoration:none;display:block;margin-top:3px">ResearchGate ↗</a>
    <a href="https://scholar.google.com/citations?user=C_Bjo14AAAAJ" target="_blank" rel="noreferrer" style="font-size:9.5px;color:var(--accent);text-decoration:none;display:block;margin-top:3px">Google Scholar ↗</a>`;

  const interestsHTML = t.interests.map(i => `<div class="info-item">${i}</div>`).join('');

  document.getElementById('panel-info').innerHTML = `
    <div class="info-card">
      <div class="info-label">${t.skillsLabel}</div>
      ${skillsHTML}${otherHTML}
    </div>
    <div class="info-card">
      <div class="info-label">${t.langLabel}</div>
      ${langsHTML}
    </div>
    <div class="info-card">
      <div class="info-label">${t.contactLabel}</div>
      ${contactHTML}
    </div>
    <div class="info-card">
      <div class="info-label">${t.infoLabel}</div>
      ${interestsHTML}
    </div>`;
}

function render() {
  const t = T[curLang];
  document.documentElement.lang = curLang;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('seeking').textContent  = t.seeking;
  renderTabs(t);
  renderMain(t);
  renderInfo(t);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === curLang));
}

// Lang switcher
document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    curLang = btn.dataset.lang;
    localStorage.setItem('cv-lang', curLang);
    render();
  })
);

render();
</script>
</body>
</html>
